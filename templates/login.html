<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SecureBank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://static.vecteezy.com/system/resources/previews/004/695/787/original/banking-service-background-bank-building-icon-made-with-currency-symbols-dollar-euro-yen-and-pound-icons-background-with-currency-signs-bank-financing-money-exchange-illustration-vector.jpg');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            width: 360px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.4);
        }

        .title {
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="login-card">

        <!-- MODE DISPLAY ONLY -->
        <div class="text-center mb-2">
            {% if mode == "vulnerable" %}
                <span class="badge bg-danger">🔴 Vulnerable Mode</span>
            {% else %}
                <span class="badge bg-success">🟢 Secure Mode</span>
            {% endif %}
        </div>

        <h3 class="title">🏦 SecureBank</h3>
        <p class="text-center text-muted">Login to your account</p>

        <!-- ERROR -->
        {% if error %}
        <div class="alert alert-danger text-center" style="font-size: 13px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>
        </form>

        <hr>

        <!-- VULNERABILITY INFO -->
        <details>
            <summary style="cursor:pointer; font-size: 13px;">🔍 Vulnerability Info</summary>
            <div class="mt-2 text-muted" style="font-size: 13px;">
                • SQL Injection allows login bypass<br>
                • Weak authentication allows session misuse
            </div>
        </details>

        <p class="text-center text-muted mt-2" style="font-size: 12px;">
            OWASP Lab Project
        </p>

    </div>

</body>
</html>
